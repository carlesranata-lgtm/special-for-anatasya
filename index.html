<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Anatasya ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* Efek Kelopak Bunga Bergerak */
        .cherry-blossom {
            position: absolute;
            background-color: #ffb3c6;
            border-radius: 150% 0 150% 150%;
            opacity: 0.8;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            max-width: 360px;
            width: 90%;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: all 0.5s ease;
        }
        h1 { 
            color: #ff4d6d; 
            font-size: 1.8rem; 
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        p { 
            color: #495057; 
            font-size: 1.1rem; 
            line-height: 1.6;
        }
        .btn {
            background: linear-gradient(135deg, #ff758f 0%, #ff4d6d 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 77, 109, 0.4);
            margin-top: 20px;
        }
        .btn:hover { 
            transform: translateY(-3px) scale(1.03); 
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.6);
        }
        .decor {
            font-size: 2rem;
            margin-top: 15px;
            display: none;
            animation: pop 0.5s ease forwards;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Wadah Bunga Gerak -->
    <script>
        function createBlossom() {
            const blossom = document.createElement('div');
            blossom.classList.add('cherry-blossom');
            blossom.style.left = Math.random() * 100 + 'vw';
            blossom.style.size = Math.random() * 10 + 10 + 'px';
            blossom.style.width = blossom.style.size;
            blossom.style.height = blossom.style.size;
            blossom.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(blossom);
            setTimeout(() => { blossom.remove(); }, 5000);
        }
        setInterval(createBlossom, 300);
    </script>

    <div class="card">
        <h1>Hai, Anatasya Rembulan 🌸</h1>
        <p id="text-ubah">Ada sesuatu yang spesial yang mau aku sampaikan ke kamu...</p>
        <div id="icon-decor" class="decor">🌸🌷✨</div>
        <button class="btn" id="main-btn" onclick="gantiPesan()">Buka Pesan</button>
    </div>

    <script>
        function gantiPesan() {
            const pesan = document.getElementById('text-ubah');
            const decor = document.getElementById('icon-decor');
            const btn = document.getElementById('main-btn');
            
            pesan.innerHTML = "Terima kasih ya, Anatasya, sudah hadir dan selalu jadi alasan aku buat tersenyum. Semangat terus buat hari ini! ❤️🌙";
            decor.style.display = "block";
            btn.style.display = "none";
        }
    </script>
</body>
</html>
