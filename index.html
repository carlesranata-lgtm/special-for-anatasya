<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatasya's Perfect Blooming Garden</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-glow: #00f5d4;
            --pink-glow: #ff758f;
            --blue-glow: #00b4d8;
            --glass-bg: rgba(10, 20, 38, 0.45);
            --border-glow: rgba(0, 245, 212, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #020104;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* --- LAYER 1: TEXT CODE BACKGROUND --- */
        .code-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            font-family: 'Fira Code', monospace;
            font-size: 13.5px;
            line-height: 1.6;
            color: rgba(0, 245, 212, 0.1);
            padding: 40px;
            white-space: pre;
            pointer-events: none;
            z-index: 1;
        }

        .code-keyword { color: rgba(255, 117, 143, 0.15); }
        .code-function { color: rgba(0, 180, 216, 0.15); }

        /* --- LAYER 2: SYSTEM CANVAS GRAPHICS --- */
        #gardenCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, transparent 20%, rgba(2, 1, 4, 0.9) 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* --- LAYER 3: FLOATING GLASSMORPHISM MUSIC WIDGETS --- */
        .widget {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 22px;
            padding: 22px;
            box-shadow: 0 0 35px rgba(0, 245, 212, 0.12), inset 0 0 15px rgba(255,255,255,0.02);
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
        }

        .widget:hover {
            transform: scale(1.03) translateY(-3px);
            border-color: var(--pink-glow);
            box-shadow: 0 0 45px rgba(255, 117, 143, 0.2);
        }

        #widget-bruno { top: 42%; left: 6%; width: 320px; }
        #widget-taylor { top: 12%; right: 8%; width: 340px; border-color: rgba(255, 117, 143, 0.25); }
        #widget-playlist { bottom: 12%; right: 6%; width: 300px; }

        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .track-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .heart-icon {
            color: var(--pink-glow);
            font-size: 0.9rem;
            animation: pulse 1.4s infinite;
        }

        .track-artist {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 15px;
            display: block;
        }

        .timeline-container {
            width: 100%; height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            position: relative;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .timeline-fill {
            position: absolute;
            top: 0; left: 0; width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--cyan-glow), var(--pink-glow));
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stars-indicator { color: #ffb703; font-size: 0.85rem; }
        .media-buttons { display: flex; gap: 14px; align-items: center; }

        .btn-media {
            background: none; border: none;
            color: #ffffff; cursor: pointer;
            font-size: 1rem; transition: color 0.2s;
        }

        .btn-media:hover { color: var(--cyan-glow); }
        
        .btn-play-circle {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-play-circle:hover { background: var(--cyan-glow); color: #020104; border-color: var(--cyan-glow); }

        .loop-mode { font-size: 0.8rem; color: rgba(255,255,255,0.35); }
        .heart-row { display: flex; gap: 5px; color: var(--blue-glow); margin: 8px 0; font-size: 0.8rem; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.18); opacity: 1; text-shadow: 0 0 10px var(--pink-glow); }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="code-bg" id="codeContainer"></div>

    <div class="vignette"></div>
    <canvas id="gardenCanvas"></canvas>

    <div class="widget" id="widget-bruno">
        <div class="track-header">
            <div class="track-title">Bruno Mars - Die With A Smile</div>
            <div class="heart-icon">💙</div>
        </div>
        <span class="track-artist">Trending Romantic Base - System Active</span>
        <div class="timeline-container"><div class="timeline-fill" id="fill-bruno" style="width: 45%"></div></div>
        <div class="controls-row">
            <span class="stars-indicator">⭐</span>
            <div class="media-buttons">
                <button class="btn-media">⏮</button>
                <button class="btn-media btn-play-circle" onclick="toggleAudio(160, [329.63, 392.00, 523.25, 587.33], 'fill-bruno')">▶</button>
                <button class="btn-media">⏭</button>
            </div>
            <span class="btn-media loop-mode">🔁</span>
        </div>
    </div>

    <div class="widget" id="widget-taylor">
        <div class="track-header">
            <div class="track-title">Taylor Swift - Lover (Remix)</div>
            <div class="heart-icon">💖</div>
        </div>
        <span class="track-artist">Midnight Room Ver. - Wave Generation</span>
        <div class="timeline-container"><div class="timeline-fill" id="fill-taylor" style="width: 20%"></div></div>
        <div class="controls-row">
            <span class="stars-indicator">🌸</span>
            <div class="media-buttons">
                <button class="btn-media">⏮</button>
                <button class="btn-media btn-play-circle" onclick="toggleAudio(140, [349.23, 440.00, 523.25, 659.25], 'fill-taylor')">▶</button>
                <button class="btn-media">⏭</button>
            </div>
            <span class="btn-media loop-mode">🔀</span>
        </div>
    </div>

    <div class="widget" id="widget-playlist">
        <div class="track-header">
            <div class="track-title">NewRomantics Playlist</div>
        </div>
        <div class="heart-row">💙 ❤️ 💜 🩵 💖</div>
        <div class="timeline-container"><div class="timeline-fill" id="fill-playlist" style="width: 75%"></div></div>
        <div class="controls-row">
            <div class="media-buttons">
                <button class="btn-media">⏮</button>
                <button class="btn-media btn-play-circle" onclick="toggleAudio(180, [293.66, 349.23, 440.00, 523.25], 'fill-playlist')">▶</button>
                <button class="btn-media">⏭</button>
            </div>
        </div>
    </div>

    <script>
        // BACKGROUND CODE MATRIX POPULATION
        const codeLines = [
            "def create_bioluminescent_complex():",
            "    initialize_garden()",
            "    set_initialize_garden()",
            "    self.space = true",
            "    self.tosoe = tone()",
            "    self.renot = true",
            "    matis = store_tonsasntiation()",
            "    muds = rstere_towsanttiercleon()",
            "    return true",
            "",
            "class RomanticEngine:",
            "    garden = garmon",
            "    self.stant()",
            "    self.ronon('BM 18 &$tamiediVo')",
            "    self.space = true",
            "    self.roat_one(0)",
            "    self.cot._classefewdtot()",
            "    self.name._classiGnon()",
            "    self.tosoe = 2",
            "    return gardent()",
            "",
            "def RomanticEngine():",
            "    self.okser()",
            "    self.rkoker()",
            "    self.rstit()",
            "    self.rseiizelas()"
        ];
        
        const container = document.getElementById('codeContainer');
        let codeBuffer = "";
        codeLines.forEach(line => {
            let processed = line
                .replace(/(def|class|return|self|true)/g, `<span class="code-keyword">$1</span>`)
                .replace(/(\w+)(?=\()/g, `<span class="code-function">$1</span>`);
            codeBuffer += processed + "\n";
        });
        container.innerHTML = codeBuffer;

        // CANVAS CORE ENGINE
        const canvas = document.getElementById('gardenCanvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        let globalTime = 0;
        let bloomScale = 0; // Mengontrol animasi mekar penuh secara real-time (0 -> 1)

        const hearts = [], notes = [], butterflies = [], grasses = [], hangingLeaves = [];

        // STRUCT: RUMPUT INDAH DI SEKITAR BUNGA
        class GrassBlade {
            constructor(x) {
                this.x = x;
                this.height = Math.random() * 45 + 35;
                this.width = Math.random() * 2 + 2;
                this.swayMax = Math.random() * 12 + 6;
                this.phase = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.02 + 0.01;
            }
            draw() {
                let sway = Math.sin(globalTime * this.speed + this.phase) * this.swayMax;
                let grad = ctx.createLinearGradient(this.x, h, this.x + sway, h - this.height);
                grad.addColorStop(0, '#02090f');
                grad.addColorStop(0.5, '#005f73');
                grad.addColorStop(1, '#00b4d8');

                ctx.beginPath();
                ctx.moveTo(this.x - this.width/2, h);
                ctx.quadraticCurveTo(this.x + sway*0.3, h - this.height*0.5, this.x + sway, h - this.height);
                ctx.quadraticCurveTo(this.x + this.width/2 + sway*0.3, h - this.height*0.5, this.x + this.width/2, h);
                ctx.fillStyle = grad;
                ctx.fill();
            }
        }

        // STRUCT: DAUN GANTUNG ATAS
        class HangingLeaf {
            constructor(x) {
                this.x = x;
                this.length = Math.random() * 60 + 40;
                this.phase = Math.random() * Math.PI;
                this.swaySpeed = Math.random() * 0.015 + 0.005;
            }
            draw() {
                let sway = Math.sin(globalTime * this.swaySpeed + this.phase) * 8;
                ctx.save();
                ctx.translate(this.x, 0);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(sway*0.5, this.length*0.5, sway, this.length);
                ctx.strokeStyle = 'rgba(0, 180, 216, 0.3)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.translate(sway, this.length);
                ctx.rotate(sway * 0.02);
                let leafGrad = ctx.createLinearGradient(0, 0, 0, 18);
                leafGrad.addColorStop(0, '#00b4d8');
                leafGrad.addColorStop(1, '#00f5d4');
                ctx.fillStyle = leafGrad;

                ctx.beginPath();
                ctx.ellipse(0, 8, 6, 12, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        // STRUCT: PARTICLES
        class FloatingDecoration {
            constructor(type) {
                this.type = type;
                this.x = Math.random() * w;
                this.y = h + Math.random() * 100;
                this.speedY = Math.random() * 0.5 + 0.4;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.scale = Math.random() * 0.3 + 0.6;
                this.phase = Math.random() * 100;
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX + Math.sin(globalTime * 0.02 + this.phase) * 0.3;
                if(this.y < -50) {
                    this.y = h + 20;
                    this.x = Math.random() * w;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);
                
                if(this.type === 'heart') {
                    ctx.fillStyle = 'rgba(255, 117, 143, 0.5)';
                    ctx.beginPath(); ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(-10, -12, -20, -5, -20, 5);
                    ctx.bezierCurveTo(-20, 15, -10, 22, 0, 30);
                    ctx.bezierCurveTo(10, 22, 20, 15, 20, 5);
                    ctx.bezierCurveTo(20, -5, 10, -12, 0, 0);
                    ctx.fill();
                } else if(this.type === 'note') {
                    ctx.fillStyle = 'rgba(0, 245, 212, 0.55)';
                    ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
                    ctx.fillRect(3, -12, 2.5, 12);
                    ctx.fillRect(3, -12, 8, 3);
                } else {
                    let bSway = Math.sin(globalTime * 0.1 + this.phase) * 5;
                    ctx.fillStyle = 'rgba(162, 210, 255, 0.55)';
                    ctx.beginPath();
                    ctx.ellipse(-5, 0, Math.abs(bSway) + 2, 7, 0, 0, Math.PI*2);
                    ctx.ellipse(5, 0, Math.abs(bSway) + 2, 7, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // LIGHT RAY GRADIENTS (GOD RAYS)
        function drawGodRays() {
            ctx.save();
            let rayGrad = ctx.createLinearGradient(w/2, 0, w/2, h*0.7);
            rayGrad.addColorStop(0, 'rgba(0, 245, 212, 0.15)');
            rayGrad.addColorStop(0.5, 'rgba(0, 180, 216, 0.05)');
            rayGrad.addColorStop(1, 'rgba(2, 1, 4, 0)');
            
            ctx.fillStyle = rayGrad;
            ctx.beginPath();
            ctx.moveTo(w/2 - 140, 0); ctx.lineTo(w/2 + 140, 0);
            ctx.lineTo(w/2 + 380, h * 0.85); ctx.lineTo(w/2 - 380, h * 0.85);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // MASTER FUNCTION: THE PERFECT SMOOTH ANIMATED BLOOMING FLOWER
        function drawPerfectBloomingFlower(centerX, centerY, baseSize, maxSway) {
            let sway = Math.sin(globalTime * 0.02 + centerX) * maxSway;
            let endX = centerX + sway;
            let endY = centerY - baseSize;

            // Batang Bunga
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.quadraticCurveTo(centerX - sway*0.2, centerY - baseSize*0.5, endX, endY);
            ctx.strokeStyle = 'rgba(0, 132, 186, 0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Sisi Daun Kecil Tangkai
            ctx.save();
            ctx.translate(centerX + sway*0.35, centerY - baseSize*0.3);
            ctx.rotate(Math.PI/4);
            let leafGrad = ctx.createLinearGradient(0,0,20,0);
            leafGrad.addColorStop(0, '#005f73'); leafGrad.addColorStop(1, '#00f5d4');
            ctx.fillStyle = leafGrad;
            ctx.beginPath(); ctx.ellipse(10, 0, 12, 4, 0, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // Kelopak Bunga Mekar (Mengikuti Skala Dinamis bloomScale)
            ctx.save();
            ctx.translate(endX, endY);
            ctx.scale(bloomScale, bloomScale); // Efek membesar/tumbuh murni berbasis matriks skala
            ctx.rotate(sway * 0.005);
            
            for(let i=0; i<6; i++) {
                ctx.rotate(Math.PI / 3);
                let petalGrad = ctx.createLinearGradient(0, 0, 0, -25);
                petalGrad.addColorStop(0, '#00b4d8');
                petalGrad.addColorStop(0.7, '#00f5d4');
                petalGrad.addColorStop(1, '#ffffff');
                ctx.fillStyle = petalGrad;
                ctx.beginPath();
                ctx.ellipse(0, -12, 7, 16, 0, 0, Math.PI*2);
                ctx.fill();
            }

            // Putik Bercahaya Tengah
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI*2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#00f5d4';
            ctx.fill();
            ctx.restore();
            ctx.shadowBlur = 0;
        }

        // POOL CONSTRUCTOR
        function setupEnvironmentPool() {
            grasses.length = 0; hangingLeaves.length = 0;
            for(let x=0; x<w; x+=6) grasses.push(new GrassBlade(x));
            for(let x=20; x<w; x+=45) hangingLeaves.push(new HangingLeaf(x));
            
            hearts.length = 0; notes.length = 0; butterflies.length = 0;
            for(let i=0; i<12; i++) hearts.push(new FloatingDecoration('heart'));
            for(let i=0; i<12; i++) notes.push(new FloatingDecoration('note'));
            for(let i=0; i<8; i++) butterflies.push(new FloatingDecoration('butterfly'));
        }

        // MAIN REFRESH PIPELINE
        function runEngine() {
            globalTime++;
            
            // Animasi mekar tumbuh berjalan konstan sampai mekar penuh sempurna
            if(bloomScale < 1) {
                bloomScale += 0.005; // Nilai kelenturan mekar yang pas
            }

            ctx.clearRect(0, 0, w, h);

            // 1. Sorotan Cahaya Langit (God Rays)
            drawGodRays();

            // 2. Daun Atas Layar
            hangingLeaves.forEach(l => l.draw());

            // 3. Objek Melayang
            hearts.forEach(h => { h.update(); h.draw(); });
            notes.forEach(n => { n.update(); n.draw(); });
            butterflies.forEach(b => { b.update(); b.draw(); });

            // 4. Proses Pembuatan Semak Rimbun & Mekar Sempurna
            let centerPoint = w / 2;
            for(let xOffset = -220; xOffset <= 220; xOffset += 25) {
                let currentX = centerPoint + xOffset;
                let heightFactor = (1 - Math.abs(xOffset) / 300); 
                let calculatedHeight = 110 + (heightFactor * 130) + Math.sin(currentX) * 20;
                
                drawPerfectBloomingFlower(currentX, h + 8, calculatedHeight, 15 + (heightFactor * 10));
            }

            // 5. Hamparan Rerumputan di Bagian Depan
            grasses.forEach(g => g.draw());

            // Music Controller Tracker
            if(activeFillId) {
                trackProgress = (trackProgress + 0.05) % 100;
                document.getElementById(activeFillId).style.width = trackProgress + "%";
            }

            requestAnimationFrame(runEngine);
        }

        // AUDIO ENGINE
        let audioCtx = null, audioInterval = null, isPlaying = false, activeFillId = null, trackProgress = 0;

        function toggleAudio(tempo, notesArr, fillId) {
            if(isPlaying) {
                clearInterval(audioInterval);
                isPlaying = false; activeFillId = null;
                return;
            }

            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            isPlaying = true;
            activeFillId = fillId;
            trackProgress = parseFloat(document.getElementById(fillId).style.width) || 0;
            let step = 0;

            audioInterval = setInterval(() => {
                let freq = notesArr[step % notesArr.length];
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
                step++;
            }, tempo);
        }

        window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; setupEnvironmentPool(); });
        setupEnvironmentPool();
        runEngine();
    </script>
</body>
</html>
